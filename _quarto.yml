project:
  type: book
  output-dir: docs
  resources:
    - algebra/unit1-operations/dynamic_exercises_codes/

book:
  title: "Math-Booklet"
  author: "Maths Department"
  date: "2/2/2026"
  site-url: https://daoud-youssef.github.io/mathsbooklet/
  repo-url: https://github.com/Daoud-youssef/mathsbooklet.git
  chapters:
    - text: "---"
    - index.qmd
    - part: "Algebra"
      chapters:
        - algebra/unit1-operations/01-operations.qmd
  page-navigation: true

bibliography: references.bib

crossref:
  exr-title: "Exercise"
  exr-prefix: "Exercise"
  chapters: true

params:
  show_solutions: false

format:
  html:
    theme: cosmo
    css: assets/custom.css
    mathjax: true

  pdf:
    engine: lualatex
    mainfont: "DejaVu Sans"
    keep-tex: true
    include-in-header:
      - text: |
          \usepackage{cancel}
          \usepackage{fontspec}

execute:
  echo: true
  warning: false
  error: false
  freeze: auto
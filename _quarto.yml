project:
  type: book
  output-dir: docs
  resources:
    - algebra/unit1-operations/dynamic_exercises_codes/
    - algebra/unit2-Indices/Indices.py
    - algebra/unit3-mensuration/Mensuration.py
    - algebra/unit4-statistics/Statistics.py
    - algebra/unit5-equations/LinearEquations.py
    - algebra/unit6-quadratics/Quadratics.py
    - algebra/unit7-functions/Functions.py
    - geometry/unit1-trigonometry/Trigonometry.py
    - assets/svg_helpers.py
    - assets/components.py
    - assets/exercise_schema.py
    - assets/renderer.py
    - assets/

book:
  title: "Math-Booklet"
  author: "Maths Department"
  date: "2/2/2026"
  site-url: https://daoud-youssef.github.io/mathsbooklet/
  repo-url: https://github.com/Daoud-youssef/mathsbooklet.git
  chapters:
    - text: "---"
    - index.qmd
    - part: "Algebra"
      chapters:
        - algebra/unit1-operations/01-operations.qmd
        - algebra/unit2-Indices/Indices.qmd
        - algebra/unit3-mensuration/Mensuration.qmd
        - algebra/unit4-statistics/Statistics.qmd
        - algebra/unit5-equations/LinearEquations.qmd
        - algebra/unit6-quadratics/Quadratics.qmd
        - algebra/unit7-functions/Functions.qmd
    - part: "Geometry"
      chapters: 
        - geometry/unit1-trigonometry/Trigonometry.qmd
  page-navigation: true

bibliography: references.bib

crossref:
  exr-title: "Exercise"
  exr-prefix: "Exercise"
  chapters: true

params:
  show_solutions: false

format:
  html:
    theme: cosmo
    css:
      - assets/custom.css
    mathjax: true
    include-in-header:
      - text: |
          <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
          <script>
          MathJax = {
            tex: {
              inlineMath: [['\\(', '\\)']],
              displayMath: [['\\[', '\\]']],
              packages: {'[+]': ['cancel', 'color']}
            },
            options: {
              skipHtmlTags: []
            },
            startup: {
              ready() {
                MathJax.startup.defaultReady();
                MathJax.startup.promise.then(() => MathJax.typesetPromise());
              }
            }
          };
          </script>

  pdf:
    engine: lualatex
    mainfont: "DejaVu Sans"
    keep-tex: true
    include-in-header:
      - text: |
          \usepackage{cancel}
          \usepackage{fontspec}
          % Silence missing-glyph warnings for emoji (HTML-only decorations)
          \tracinglostchars=0\relax

execute:
  echo: true
  warning: false
  error: false
  freeze: auto
  python-path: ["assets"]